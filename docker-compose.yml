version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: ai_sql_postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: ai_sql_redis

    ports:
      - "6379:6379"

  backend:
    build: ./server
    env_file:
      - ./server/.env

    container_name: ai_sql_backend

    ports:
      - "5000:5000"

    depends_on:
      - postgres
      - redis

  frontend:
    build: ./client

    container_name: ai_sql_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: